services:
  - type: web
    name: dozenko-crm
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # GITHUB_TOKEN, GITHUB_REPO: set in Render dashboard (not committed here).
      # Required for brain.db to survive free-plan restarts via GitHub backup.