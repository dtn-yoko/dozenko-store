services:
  - type: web
    name: dozenko-crm
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_PATH
        value: /var/data/brain.db
    disk:
      name: dozenko-data
      mountPath: /var/data
      sizeGB: 1